# =========================================================
# VideoEmotion - Global Configuration
# =========================================================

project:
  name: VideoEmotion
  version: 1.0
  description: Unified pipeline for video-based emotion analysis

# =========================================================
# Frame Extraction
# =========================================================
frame_extraction:
  fps: 5
  image_format: jpg

# =========================================================
# Face Detection (MediaPipe)
# =========================================================
face_detection:
  backend: mediapipe

  tracking:
    enabled: true
    max_missing_frames: 60
    iou_threshold: 0.30
    center_distance_max: 220

  filters:
    min_det_score: 0.70
    min_det_size: 80
    max_aspect_ratio: 1.80
    enable_eye_ratio_filter: true
    eye_ratio_min: 0.28

  bbox_smoothing:
    enabled: true
    alpha: 0.70

  quality_filters:
    min_face_size: 60
    blur_min_laplacian: 40.0
    brightness:
      min: 35
      max: 220

# =========================================================
# Emotion Analysis (OFFLINE)
# =========================================================
emotion_analysis:
  primary_model: hsemotion
  fallback_model: deepface

  quality:
    blur_min_laplacian: 60.0
    brightness_min: 35.0
    brightness_max: 220.0

  run_deepface_always: false

  hsemotion:
    confidence_threshold: 0.65

  deepface:
    confidence_threshold: 0.70
    detector_backend: skip
    enforce_detection: true

  smoothing:
    enabled: true
    window: 3
    centered: true
    apply_on:
      - final_emotion
      - confidence

  smoothing_score:
    enabled: true
    use_final: true

  uncertain:
    enabled: true
    min_conf: 0.55

  tta:
    enabled: true
    max_variants: 5
    rotation_deg: 5
    brightness_factor: 0.10

# =========================================================
# Realtime (TEMPS RÉEL) — seuils séparés (PLUS PERMISSIFS)
# =========================================================
realtime:
  mirror_fix: true
  display_width: 0

  face_detection:
    min_det_score: 0.55

  emotion:
    hse_conf_threshold: 0.25
    uncertain_min_conf: 0.10
    enable_uncertain: true

# =========================================================
# Summary & Reporting
# =========================================================
summary:
  prefer_smoothed: true
  generate_csv: true
  generate_txt: true
  auto_group_sessions: true
  master_session_name: ALL_SESSIONS_MASTER

# =========================================================
# Paths
# =========================================================
paths:
  videos: data/videos
  extracted_frames: data/extracted_frames
  detected_faces: data/detected_faces
  emotion_results: output/emotion_results
  reports: output/reports/offline

# =========================================================
# Logging & Debug
# =========================================================
logging:
  level: INFO
  show_warnings: true
  show_progress: true

# =========================================================
# Runtime Settings
# =========================================================
runtime:
  py_detect: "C:\\Users\\ruben\\Desktop\\VideoEmotion\\mp_env\\Scripts\\python.exe"
